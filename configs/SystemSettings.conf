# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Default settings
# This is where you put your own settings as this will not be touched during update 
# if the upgrade.sh is used.

# refer to Hyprland wiki for more info https://wiki.hyprland.org/Configuring/Variables/
# NOTE: some settings are in ~/.config/hypr/UserConfigs/UserDecorAnimations.conf

$scriptsDir = $HOME/.config/hypr/scripts

dwindle {
  pseudotile = true
  preserve_split = true
  #smart_split = true
  special_scale_factor = 0.8
}

master {
  # new_status = master # incompatível com Hyprland 0.39.1
  new_on_top = 1
  mfact = 0.5
}

general {
  resize_on_border = true
  layout = dwindle
}

input {
  kb_layout = br
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =
  repeat_rate = 50
  repeat_delay = 300
  
  sensitivity = 0 #mouse sensitivity
  #accel_profile =     # flat or adaptive or blank or EMPTY means libinput’s default mode
  numlock_by_default = true
  left_handed = false
  follow_mouse = 1
  float_switch_override_focus = false

  touchpad {
    disable_while_typing = true
    natural_scroll = true 
    clickfinger_behavior = false
    middle_button_emulation = false
    tap-to-click = true
    drag_lock = false
  }
  
  # below for devices with touchdevice ie. touchscreen
	touchdevice {
		# enabled = true # incompatível com Hyprland 0.39.1
	}
	
	# below is for table see link above for proper variables
	tablet {
		transform = 0
		left_handed = 0
	}
}


gestures {
  #   gesture = 3, horizontal, workspace # incompatível com Hyprland 0.39.1
  workspace_swipe_distance = 500
  workspace_swipe_invert = true
  workspace_swipe_min_speed_to_force = 30
  workspace_swipe_cancel_ratio = 0.5
  workspace_swipe_create_new = true 
  workspace_swipe_forever = true
  #workspace_swipe_use_r = true #uncomment if wanted a forever create a new workspace with swipe right

  #   gesture = 4, up, dispatcher, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.5}')" # incompatível com Hyprland 0.39.1
  #   gesture = 4, down, dispatcher, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.5}')"  # incompatível com Hyprland 0.39.1
  #   gesture = 3, up, dispatcher, exec, $scriptsDir/OverviewToggle.sh  # incompatível com Hyprland 0.39.1
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  vfr = true
  vrr = 2
  mouse_move_enables_dpms = true
  enable_swallow = off
  swallow_regex = ^(kitty)$
  focus_on_activate = false
  #   initial_workspace_tracking = 0 # incompatível com Hyprland 0.39.1
  #   middle_click_paste = false # incompatível com Hyprland 0.39.1
  #   enable_anr_dialog = true    # Application not Responding (ANR) # incompatível com Hyprland 0.39.1
  #   anr_missed_pings = 15       # ANR Threshold default 1 is too low # incompatível com Hyprland 0.39.1
  allow_session_lock_restore = true  # Prevent lockscreen crash when resume from suspend
  # This only works with HL v0.53+
  #   on_focus_under_fullscreen = 1 # incompatível com Hyprland 0.39.1
  # 0 - Default, no change
  # 1 - New focused window takes over fullscreen (Windows-like Alt-Tab)
  # 2 - New focused window stays behind the fullscreen one
}

#opengl {
#  nvidia_anti_flicker = true
#}

binds {
  workspace_back_and_forth = true
  allow_workspace_cycles = true
  pass_mouse_when_bound = false
}

#Could help when scaling and not pixelating
xwayland {
  # enabled = true # incompatível com Hyprland 0.39.1
  force_zero_scaling = true
}

render {
  #   direct_scanout = 0 # incompatível com Hyprland 0.39.1
}

cursor {
  #   sync_gsettings_theme = true # incompatível com Hyprland 0.39.1
  #   no_hardware_cursors = 2 # change to 1 if want to disable # incompatível com Hyprland 0.39.1
  #   enable_hyprcursor = true # incompatível com Hyprland 0.39.1
  #   warp_on_change_workspace = 2 # incompatível com Hyprland 0.39.1
  #   no_warps = true  # incompatível com Hyprland 0.39.1
}
